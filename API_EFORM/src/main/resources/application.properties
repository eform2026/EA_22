spring.application.name=products-react-api

# Puerto configurable por .env (default 8080)
server.port=${SERVER_PORT:8080}

# ---- JPA / Hibernate (base) ----
# El manejo del schema se define por perfil.
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# ---- Seeding inicial (data.sql) ----
# spring.sql.init.mode=always
# spring.jpa.defer-datasource-initialization=true

# ---- JWT ----
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ---- Jackson ----
spring.jackson.serialization.WRITE_DATES_AS_TIMESTAMPS=false
spring.jackson.time-zone=America/Bogota
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss

# ---- Manejo de errores: no exponer stacktrace al cliente ----
spring.web.error.include-stacktrace=never
spring.web.error.include-message=always

# ---- Frontend URL y Mail ----
app.frontend-url=${APP_FRONTEND_URL:http://localhost:5173}
app.mail.from=${APP_MAIL_FROM:carolinatudi3@gmail.com}

# ---- Brevo API ----
brevo.api.key=${BREVO_API_KEY:}

# ---- Logging ----
logging.level.org.springframework.security=INFO
logging.level.co.edu.sena.productsreact=DEBUG
